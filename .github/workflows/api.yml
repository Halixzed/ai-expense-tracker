name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'ExpenseTracker.Api/**'
      - '.github/workflows/api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        working-directory: ExpenseTracker.Api
        run: |
          docker build -t expense-tracker-api .
          docker tag expense-tracker-api:latest 782954094595.dkr.ecr.eu-west-2.amazonaws.com/expense-tracker-api:latest
          docker push 782954094595.dkr.ecr.eu-west-2.amazonaws.com/expense-tracker-api:latest
